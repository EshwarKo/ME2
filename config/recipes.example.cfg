-- Copy to /home/me2/recipes.cfg. Recipes are plain, hand-authored data (charter §5): a list of
-- { output, inputs }. Item references are human-readable label/name QUERIES, resolved to identity
-- keys at make-time against the registry -- so you never hand-write a hash, and the same recipe
-- works in any world once storage has learned the items.
--
--   output : { item = <query>, count = n }   -- what one batch produces (count defaults to 1)
--   inputs : { { item = <query>, count = n }, ... }  -- consumed from storage per batch
--
-- `make <query>` matches a recipe by an output label/name substring (ambiguous -> abort). The
-- crafter must already be set up to turn these inputs into this output; OC only feeds and polls.
{
  {
    output = { item = "Iron Plate", count = 1 },
    inputs = { { item = "Iron Ingot", count = 1 } },
  },
  {
    output = { item = "Iron Rod", count = 1 },
    inputs = { { item = "Iron Ingot", count = 1 } },
  },
}
