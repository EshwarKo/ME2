-- Copy to /home/me2/recipes.cfg. Recipes are plain, hand-authored data (charter §5): a list of
-- { output, inputs }. Item references are human-readable QUERIES, resolved to identity keys at
-- make-time against the registry -- so you never hand-write a hash, and the same recipe works in
-- any world once storage has learned the items.
--
-- Reference an item TWO ways (prefer the first for GregTech):
--   ore  = <oreDict class>   -- e.g. "plateIron", "ingotIron" -- STABLE even when GregTech
--                               drifts an item's display label; the robust choice.
--   item = <label/name>      -- display label or registry id; exact wins, else substring.
-- You may give both: `ore` is tried first, `item` is the fallback.
--
--   output : { ore|item = <query>, count = n }   -- what one batch produces (count defaults to 1)
--   inputs : { { ore|item = <query>, count = n }, ... }  -- consumed from storage per batch
--
-- `make <query>` matches a recipe by output ore-class (exact) or label/name (exact, else
-- substring). When a query resolves to several real items, make picks the one you hold the most
-- of -- it never guesses blindly or merges distinct items.
--
-- REQUIRED OC config for oreDict + NBT identity (both default OFF, set once in
-- .minecraft/config/opencomputers/settings.conf then restart):
--   debug.insertIdsInConverters = true               -- exposes oreNames (oreDict classes)
--   integration.vanilla.allowItemStackNBTTags = true -- exposes NBT for exact identity
--
-- The crafter must already turn these inputs into this output; OC only feeds and polls.
{
  {
    output = { ore = "plateIron", item = "Iron Plate", count = 1 },
    inputs = { { ore = "ingotIron", item = "Iron Ingot", count = 1 } },
  },
  {
    output = { ore = "stickIron", item = "Iron Rod", count = 1 },
    inputs = { { ore = "ingotIron", item = "Iron Ingot", count = 1 } },
  },
}
