-- Copy to /home/me2/roles.cfg and fill in the transposer address reported by `scan`.
-- This is the ONLY file where hardware addresses live (charter: hardware is a late binding).
-- `side` is the face of that transposer the inventory sits on:
--   down / up / north / south / west / east
--
-- Layout this matches: ONE transposer -- north = storage, west = crafting input,
-- east = crafting output. All three share the one transposer, so items move directly
-- between them (no buffer chest needed).
{
  storage      = { transposer = "REPLACE-WITH-TRANSPOSER-UUID", side = "north" },
  craft_input  = { transposer = "REPLACE-WITH-TRANSPOSER-UUID", side = "west" },
  craft_output = { transposer = "REPLACE-WITH-TRANSPOSER-UUID", side = "east" },
}
