-- Copy to /home/me2/roles.cfg and fill in the transposer addresses reported by `scan`.
-- This is the ONLY file where hardware addresses live (charter: hardware is a late binding).
-- `side` is the face of that transposer the inventory sits on:
--   down / up / north / south / west / east
--
-- Layout this matches: transposer 1 -> storage chest; transposer 2 -> input + output chests.
{
  -- transposer 1
  storage      = { transposer = "REPLACE-WITH-T1-UUID", side = "north" },

  -- transposer 2  (the feed-and-poll autocrafting pair)
  craft_input  = { transposer = "REPLACE-WITH-T2-UUID", side = "north" },
  craft_output = { transposer = "REPLACE-WITH-T2-UUID", side = "south" },
}
